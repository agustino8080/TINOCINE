<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Extractor - Debug Películas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: #3b82f6;
      margin-bottom: 30px;
      text-align: center;
    }
    
    .test-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .test-section h2 {
      color: #60a5fa;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    
    input[type="text"] {
      flex: 1;
      min-width: 250px;
      padding: 10px 15px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 14px;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
      background: #1a2332;
    }
    
    button {
      padding: 10px 25px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #2563eb;
    }
    
    button:active {
      background: #1d4ed8;
    }
    
    .status {
      padding: 10px 15px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    
    .status.loading {
      background: #1e40af;
      color: #93c5fd;
    }
    
    .status.success {
      background: #15803d;
      color: #86efac;
    }
    
    .status.error {
      background: #7c2d12;
      color: #fecaca;
    }
    
    .results {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #334155;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-info { color: #60a5fa; }
    .log-success { color: #86efac; }
    .log-error { color: #fecaca; }
    .log-warn { color: #fbbf24; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }
    
    .stat-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 15px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #94a3b8;
    }
    
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    
    .table th {
      background: #1e293b;
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #334155;
      color: #60a5fa;
      font-weight: 600;
    }
    
    .table td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }
    
    .table tr:hover {
      background: #1e293b;
    }
    
    .type-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .type-video { background: #dc2626; color: #fecaca; }
    .type-image { background: #2563eb; color: #93c5fd; }
    .type-folder { background: #9333ea; color: #d8b4fe; }
    .type-archive { background: #ea580c; color: #fed7aa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Test Extractor - Debug Películas</h1>
    
    <div class="test-section">
      <h2>Prueba de Conexión y Extracción</h2>
      
      <div class="input-group">
        <input 
          type="text" 
          id="serverUrl" 
          placeholder="Ej: http://15.235.51.60/server3/contenido/peliculas/" 
          value="http://15.235.51.60/server3/contenido/peliculas/"
        >
        <button onclick="testExtraction()">🔍 Probar Extracción</button>
      </div>
      
      <div id="status" class="status" style="display: none;"></div>
      
      <div id="results" class="results" style="display: none;"></div>
      
      <div id="stats" class="stats-grid" style="display: none;"></div>
      
      <table id="movieTable" class="table" style="display: none;">
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Título</th>
            <th>URL</th>
            <th>Tamaño</th>
          </tr>
        </thead>
        <tbody id="movieTableBody">
        </tbody>
      </table>
    </div>
    
    <div class="test-section">
      <h2>Servidores Predefinidos</h2>
      <div class="input-group">
        <button onclick="setUrl('http://15.235.51.60/server3/contenido/peliculas/')">Servidor Principal</button>
        <button onclick="setUrl('http://15.235.51.60/server3/contenido/peliculas/estrenos/')">Estrenos</button>
        <button onclick="setUrl('http://15.235.51.60/server3/contenido/peliculas/proximamente/')">Proximamente</button>
        <button onclick="setUrl('http://15.235.51.60/server3/contenido/peliculas/clasicos/')">Clásicos</button>
      </div>
    </div>
  </div>

  <script>
    const log = (message, type = 'info') => {
      const resultsDiv = document.getElementById('results');
      resultsDiv.style.display = 'block';
      
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = message;
      resultsDiv.appendChild(entry);
      resultsDiv.scrollTop = resultsDiv.scrollHeight;
    };

    const clearLog = () => {
      document.getElementById('results').innerHTML = '';
      document.getElementById('results').style.display = 'none';
      document.getElementById('stats').innerHTML = '';
      document.getElementById('stats').style.display = 'none';
      document.getElementById('movieTable').style.display = 'none';
    };

    const setUrl = (url) => {
      document.getElementById('serverUrl').value = url;
    };

    const showStatus = (message, type) => {
      const statusDiv = document.getElementById('status');
      statusDiv.className = `status ${type}`;
      statusDiv.textContent = message;
      statusDiv.style.display = 'block';
    };

    const parseMoviesFromHTML = (html, baseUrl) => {
      const movies = [];
      const movieMap = new Map();
      let id = 1;

      log(`[PARSER] Analizando HTML de ${baseUrl} (${html.length} bytes)`, 'info');

      if (!html || html.length === 0) {
        log('[PARSER] HTML vacío', 'warn');
        return [];
      }

      // ESTRATEGIA 1: Enlaces en <a href>
      const linkPattern = /<a[^>]+href=["']([^"']+)["'][^>]*>([^<]*)<\/a>/gi;
      const allLinks = new Set();
      let match;

      while ((match = linkPattern.exec(html)) !== null) {
        const href = match[1];
        if (!href.includes('?') && href !== '../' && href !== './' && href !== '/' && !href.startsWith('?') && href.trim() !== '') {
          allLinks.add(href);
          log(`[LINK] ${href}`, 'info');
        }
      }

      // ESTRATEGIA 2: URLs en texto plano
      const urlPattern = /[\w\-\.]+\.(mp4|mkv|avi|mov|webm|m3u8|jpg|jpeg|png|gif|webp|zip|rar|7z)(?:\s|<|$|\/)/gi;
      while ((match = urlPattern.exec(html)) !== null) {
        const url = match[0].trim().replace(/\/$/, '');
        if (url && !url.startsWith('http') && url.length > 2) {
          allLinks.add(url);
          log(`[URL TEXTO] ${url}`, 'info');
        }
      }

      // ESTRATEGIA 3: URLs con protocolo
      const protocolPattern = /(https?:\/\/[^\s<>"{}|\\^`\[\]]*\.(?:mp4|mkv|avi|mov|webm|m3u8|jpg|jpeg|png|gif|webp))/gi;
      while ((match = protocolPattern.exec(html)) !== null) {
        allLinks.add(match[1]);
        log(`[HTTP URL] ${match[1]}`, 'info');
      }

      log(`[PARSER] Total de links encontrados: ${allLinks.size}`, 'info');

      // Procesar enlaces
      const getFileType = (filename) => {
        const ext = filename.split('.').pop()?.toLowerCase() || 'unknown';
        const types = {
          'mp4': 'video', 'mkv': 'video', 'avi': 'video', 'mov': 'video',
          'jpg': 'image', 'jpeg': 'image', 'png': 'image', 'gif': 'image', 'webp': 'image'
        };
        return types[ext] || 'file';
      };

      const cleanMovieTitle = (filename) => {
        return filename
          .replace(/\.[^/.]+$/, '')
          .replace(/\-/g, ' ')
          .replace(/_/g, ' ')
          .replace(/\./g, ' ')
          .replace(/\[.*?\]/g, '')
          .replace(/\(.*?\)/g, '')
          .replace(/  +/g, ' ')
          .replace(/(?:720p|1080p|2160p|4k|hdtv|bluray|dvdrip|webrip|x264|h\.264|h264|aac|flac|ac3)/gi, '')
          .replace(/  +/g, ' ')
          .trim()
          .split(' ')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
          .join(' ') || 'Sin Título';
      };

      const resolveUrl = (baseUrl, relativePath) => {
        if (relativePath.startsWith('http')) return relativePath;
        if (relativePath.startsWith('/')) return baseUrl.split('/').slice(0, 3).join('/') + relativePath;
        const base = baseUrl.endsWith('/') ? baseUrl : baseUrl + '/';
        return new URL(relativePath, base).href;
      };

      for (const link of allLinks) {
        if (!link || movieMap.has(link) || link.trim() === '') continue;

        const cleanLink = link.trim();
        const isFolder = cleanLink.endsWith('/');
        const isMedia = /\.(mp4|mkv|avi|mov|webm|m3u8)$/i.test(cleanLink);
        const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(cleanLink);
        const isArchive = /\.(zip|rar|7z)$/i.test(cleanLink);
        const isPlaylist = /\.(m3u|m3u8|pls)$/i.test(cleanLink);
        const isValid = isFolder || isMedia || isImage || isArchive || isPlaylist;

        if (isValid) {
          try {
            const title = cleanMovieTitle(cleanLink);
            const fullUrl = resolveUrl(baseUrl, cleanLink);
            
            if (!title || title === 'Sin Título' || title.length < 2) {
              log(`[SKIP] Título inválido: ${cleanLink}`, 'warn');
              continue;
            }

            const type = isFolder ? 'carpeta' : (isMedia ? 'video' : (isImage ? 'imagen' : 'archivo'));
            const movie = {
              id: id++,
              title,
              url: fullUrl,
              type,
              filename: cleanLink,
              fileType: getFileType(cleanLink)
            };

            movies.push(movie);
            movieMap.set(cleanLink, true);
            log(`[EXTRACT] ${type.toUpperCase()}: ${title}`, 'success');
          } catch (error) {
            log(`[ERROR] Procesando ${cleanLink}: ${error.message}`, 'error');
          }
        }
      }

      log(`[RESULTADO] ${movies.length} elementos extraídos de ${baseUrl}`, 'success');
      return movies;
    };

    const testExtraction = async () => {
      clearLog();
      const serverUrl = document.getElementById('serverUrl').value.trim();
      
      if (!serverUrl) {
        showStatus('Por favor ingresa una URL', 'error');
        return;
      }

      showStatus('Conectando...', 'loading');
      log(`📡 Conectando a: ${serverUrl}`, 'info');

      try {
        const response = await fetch(serverUrl, {
          method: 'GET',
          mode: 'cors',
          credentials: 'omit',
          headers: { 'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const html = await response.text();
        log(`✅ HTML recibido: ${html.length} bytes`, 'success');
        log(`📝 Primeros 500 caracteres: ${html.substring(0, 500)}`, 'info');

        const movies = parseMoviesFromHTML(html, serverUrl);

        if (movies.length > 0) {
          showStatus(`✅ ${movies.length} elementos encontrados`, 'success');

          // Mostrar estadísticas
          const stats = {
            'Total': movies.length,
            'Videos': movies.filter(m => m.type === 'video').length,
            'Imágenes': movies.filter(m => m.type === 'imagen').length,
            'Carpetas': movies.filter(m => m.type === 'carpeta').length,
          };

          const statsDiv = document.getElementById('stats');
          statsDiv.style.display = 'grid';
          statsDiv.innerHTML = Object.entries(stats)
            .map(([label, value]) => `<div class="stat-box"><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div>`)
            .join('');

          // Mostrar tabla
          const table = document.getElementById('movieTable');
          const tbody = document.getElementById('movieTableBody');
          tbody.innerHTML = movies.map(m => `
            <tr>
              <td><span class="type-badge type-${m.fileType}">${m.type}</span></td>
              <td>${m.title}</td>
              <td><small>${m.url}</small></td>
              <td>${m.filename.length}b</td>
            </tr>
          `).join('');
          table.style.display = 'table';
        } else {
          showStatus('❌ No se encontraron películas', 'error');
          log('Verifica que el servidor esté devolviendo HTML correcto', 'warn');
        }
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
        log(`Error: ${error.message}`, 'error');
        log(`Stack: ${error.stack}`, 'error');
      }
    };

    // Evento de Enter
    document.getElementById('serverUrl').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') testExtraction();
    });
  </script>
</body>
</html>
